<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<head><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous"></head>

<div class="container">

    <form action="#"
          th:action="@{/createNewPost}"
          th:object="${post}"
          method="post">

        <div class="form-group">
            <label for="Title">Enter The Title</label>
            <input type="text" name="title" id="title" class="form-control" placeholder="Title" required="true" autofocus="true"/>
        </div>

        <div class="form-group">
            <label for="Title">Enter the Description</label>
            <textarea type="text" name="description" id="description"  class="form-control" placeholder="Description" required="true" rows="3"></textarea>
        </div>

        <div>
            <button type="submit" class="btn btn-primary">Send</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
